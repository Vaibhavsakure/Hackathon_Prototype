services:
  - type: web
    name: auraoptima
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-2.0-flash"
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
      - key: PYTHON_VERSION
        value: "3.11.11"
