<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AuraOptima AI — Golden Signature Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #080c10;
    --surface:  #0d1117;
    --card:     #111820;
    --border:   #1e2d3d;
    --accent:   #00e5ff;
    --accent2:  #39ff14;
    --warn:     #ffb300;
    --danger:   #ff3d57;
    --text:     #e8f0fe;
    --muted:    #6b7a8d;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    overflow-x: hidden;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── LAYOUT ── */
  .shell { display: flex; height: 100vh; }
  .sidebar {
    width: 220px; min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 24px 0;
    position: relative;
    overflow: hidden;
  }
  .sidebar::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

  /* ── SIDEBAR LOGO ── */
  .logo-block { padding: 0 20px 24px; border-bottom: 1px solid var(--border); }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #0066ff);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; margin-bottom: 10px;
  }
  .logo-name {
    font-family: var(--font-mono);
    font-size: 13px; font-weight: 700;
    color: var(--accent); letter-spacing: 1px;
  }
  .logo-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* ── NAV ── */
  .nav { padding: 16px 0; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; cursor: pointer;
    font-size: 13px; color: var(--muted);
    transition: all 0.15s; border-left: 2px solid transparent;
    user-select: none;
  }
  .nav-item:hover { color: var(--text); background: rgba(0,229,255,0.04); }
  .nav-item.active {
    color: var(--accent); background: rgba(0,229,255,0.08);
    border-left-color: var(--accent);
  }
  .nav-icon { font-size: 15px; width: 20px; text-align: center; }

  /* ── MODE SELECTOR ── */
  .mode-block { padding: 16px 20px; border-top: 1px solid var(--border); }
  .mode-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .mode-btn {
    display: block; width: 100%; padding: 8px 10px; margin-bottom: 4px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted); font-size: 12px;
    cursor: pointer; text-align: left; transition: all 0.15s;
    font-family: var(--font-body);
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--text); }
  .mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.08); }

  /* ── TOPBAR ── */
  .topbar {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-title { font-family: var(--font-mono); font-size: 14px; color: var(--text); }
  .topbar-badges { display: flex; gap: 8px; }
  .badge {
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 500; font-family: var(--font-mono);
  }
  .badge-cyan  { background: rgba(0,229,255,0.12); color: var(--accent); border: 1px solid rgba(0,229,255,0.3); }
  .badge-green { background: rgba(57,255,20,0.10); color: var(--accent2); border: 1px solid rgba(57,255,20,0.3); }
  .badge-warn  { background: rgba(255,179,0,0.12); color: var(--warn); border: 1px solid rgba(255,179,0,0.3); }
  .badge-danger{ background: rgba(255,61,87,0.12); color: var(--danger); border: 1px solid rgba(255,61,87,0.3); }

  /* ── PAGE ── */
  .page { padding: 28px 32px; flex: 1; }
  .page-title { font-family: var(--font-mono); font-size: 20px; color: var(--text); margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 20px;
  }
  .card-title { font-family: var(--font-mono); font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }

  /* ── GRID ── */
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 20px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 20px; }

  /* ── KPI CARD ── */
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
  .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .kpi-value { font-family: var(--font-mono); font-size: 26px; font-weight: 700; color: var(--text); }
  .kpi-delta { font-size: 12px; margin-top: 4px; }
  .kpi-delta.pos { color: var(--accent2); }
  .kpi-delta.neg { color: var(--danger); }
  .kpi-delta.neu { color: var(--muted); }

  /* ── STATUS PILL ── */
  .status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .status.HEALTHY { background: rgba(57,255,20,0.12); color: var(--accent2); }
  .status.WARNING { background: rgba(255,179,0,0.12); color: var(--warn); }
  .status.CRITICAL{ background: rgba(255,61,87,0.12); color: var(--danger); }

  /* ── DEVIATION BAR ── */
  .dev-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .dev-label { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 160px; flex-shrink: 0; }
  .dev-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; position: relative; overflow: hidden; }
  .dev-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .dev-pct { font-family: var(--font-mono); font-size: 11px; width: 60px; text-align: right; flex-shrink: 0; }
  .dev-rec { font-size: 11px; color: var(--muted); margin-top: 2px; margin-left: 172px; margin-bottom: 6px; }

  /* ── TABLE ── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 10px 12px; text-align: left; font-family: var(--font-mono); font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid rgba(30,45,61,0.5); }
  tr:hover td { background: rgba(0,229,255,0.03); }

  /* ── SELECT / INPUT ── */
  select, input {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: 6px;
    font-family: var(--font-body); font-size: 13px; outline: none;
    cursor: pointer; transition: border-color 0.15s;
  }
  select:hover, input:hover, select:focus, input:focus { border-color: var(--accent); }

  /* ── BUTTON ── */
  .btn {
    padding: 8px 16px; border-radius: 6px; border: 1px solid;
    font-family: var(--font-body); font-size: 13px; cursor: pointer;
    transition: all 0.15s; font-weight: 500;
  }
  .btn-cyan { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.08); }
  .btn-cyan:hover { background: rgba(0,229,255,0.18); }
  .btn-green { border-color: var(--accent2); color: var(--accent2); background: rgba(57,255,20,0.08); }
  .btn-green:hover { background: rgba(57,255,20,0.18); }
  .btn-danger { border-color: var(--danger); color: var(--danger); background: rgba(255,61,87,0.08); }
  .btn-danger:hover { background: rgba(255,61,87,0.18); }

  /* ── PROGRESS ── */
  .progress-wrap { background: var(--border); border-radius: 4px; height: 8px; overflow: hidden; }
  .progress-bar  { height: 100%; border-radius: 4px; transition: width 0.8s ease; }

  /* ── LOADING ── */
  .loading { text-align: center; padding: 60px; color: var(--muted); font-family: var(--font-mono); font-size: 13px; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── PLOTLY DARK ── */
  .js-plotly-plot .plotly .bg { fill: transparent !important; }

  /* ── ACTIONS LIST ── */
  .action-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px; border-radius: 8px; margin-bottom: 8px;
    border: 1px solid;
  }
  .action-item.CRITICAL { border-color: rgba(255,61,87,0.3); background: rgba(255,61,87,0.05); }
  .action-item.WARNING  { border-color: rgba(255,179,0,0.3);  background: rgba(255,179,0,0.05); }
  .action-item.OK       { border-color: rgba(57,255,20,0.2);  background: rgba(57,255,20,0.04); }

  /* ── PROPOSAL CARD ── */
  .proposal-card {
    border: 1px solid var(--border); border-radius: 10px;
    padding: 18px; margin-bottom: 12px; background: var(--card);
  }
  .proposal-card.PENDING { border-left: 3px solid var(--warn); }
  .proposal-card.ACCEPTED{ border-left: 3px solid var(--accent2); }
  .proposal-card.REJECTED{ border-left: 3px solid var(--muted); }

  /* ── PARETO BADGE ── */
  .pareto-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; margin-right: 6px;
  }

  /* ── SECTION DIVIDER ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  textarea {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: 6px;
    font-family: var(--font-body); font-size: 13px; outline: none;
    resize: vertical; width: 100%;
  }
  textarea:focus { border-color: var(--accent); }

  .sig-param { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(30,45,61,0.5); font-size: 13px; }
  .sig-param:last-child { border-bottom: none; }
  .sig-param-name { color: var(--muted); font-family: var(--font-mono); font-size: 11px; }
  .sig-param-val  { color: var(--accent); font-family: var(--font-mono); font-size: 12px; }

  /* ── CHAT PANEL ── */
  .chat-fab {
    position: fixed; bottom: 24px; right: 24px; z-index: 1000;
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #0066ff);
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 24px; box-shadow: 0 4px 20px rgba(0,229,255,0.3);
    transition: all 0.3s ease; color: #080c10;
  }
  .chat-fab:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(0,229,255,0.5); }
  .chat-fab.open { border-radius: 12px; }
  .chat-fab-pulse {
    position: absolute; width: 100%; height: 100%; border-radius: 50%;
    background: rgba(0,229,255,0.3); animation: fabpulse 2s ease-out infinite;
  }
  @keyframes fabpulse {
    0%   { transform: scale(1);   opacity: 0.5; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  .chat-panel {
    position: fixed; bottom: 92px; right: 24px; z-index: 999;
    width: 420px; height: 560px; max-height: calc(100vh - 120px);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; display: flex; flex-direction: column;
    box-shadow: 0 12px 48px rgba(0,0,0,0.5);
    animation: chatSlideIn 0.3s ease;
    overflow: hidden;
  }
  @keyframes chatSlideIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .chat-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card);
  }
  .chat-header-title {
    font-family: var(--font-mono); font-size: 13px; color: var(--accent);
    display: flex; align-items: center; gap: 8px;
  }
  .chat-header-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent2);
    animation: dotpulse 1.5s ease-in-out infinite;
  }
  @keyframes dotpulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .chat-close {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 18px; padding: 4px; border-radius: 6px;
    transition: all 0.15s;
  }
  .chat-close:hover { color: var(--text); background: rgba(255,255,255,0.05); }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .chat-msg {
    max-width: 88%; padding: 10px 14px; border-radius: 12px;
    font-size: 13px; line-height: 1.5; word-wrap: break-word;
  }
  .chat-msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(0,102,255,0.15));
    border: 1px solid rgba(0,229,255,0.25); color: var(--text);
    border-bottom-right-radius: 4px;
  }
  .chat-msg.assistant {
    align-self: flex-start;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .chat-msg.assistant p { margin: 0 0 8px; }
  .chat-msg.assistant p:last-child { margin-bottom: 0; }
  .chat-msg.assistant strong { color: var(--accent); }
  .chat-msg.assistant ul, .chat-msg.assistant ol { margin: 4px 0 8px 16px; padding: 0; }
  .chat-msg.assistant li { margin-bottom: 4px; }
  .chat-msg.assistant code {
    background: rgba(0,229,255,0.1); padding: 1px 5px; border-radius: 3px;
    font-family: var(--font-mono); font-size: 11px; color: var(--accent);
  }

  .chat-typing {
    align-self: flex-start; padding: 12px 16px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; border-bottom-left-radius: 4px;
    display: flex; gap: 4px; align-items: center;
  }
  .chat-typing-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    animation: typingBounce 1.4s ease-in-out infinite;
  }
  .chat-typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .chat-typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .chat-chips {
    padding: 8px 16px; display: flex; gap: 6px; flex-wrap: wrap;
    border-top: 1px solid var(--border);
  }
  .chat-chip {
    padding: 5px 10px; border-radius: 20px;
    background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.2);
    color: var(--accent); font-size: 11px; cursor: pointer;
    transition: all 0.15s; font-family: var(--font-body); white-space: nowrap;
  }
  .chat-chip:hover { background: rgba(0,229,255,0.18); border-color: var(--accent); }

  .chat-input-area {
    padding: 12px 16px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; background: var(--card);
  }
  .chat-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 10px;
    font-family: var(--font-body); font-size: 13px; outline: none;
    resize: none; min-height: 40px; max-height: 80px;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted); }
  .chat-send {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #0066ff);
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: #080c10; transition: all 0.15s;
    flex-shrink: 0; align-self: flex-end;
  }
  .chat-send:hover { transform: scale(1.05); }
  .chat-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── AI INSIGHT BANNER ── */
  .ai-insight {
    background: linear-gradient(135deg, rgba(0,229,255,0.06), rgba(0,102,255,0.06));
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
    position: relative; overflow: hidden;
  }
  .ai-insight::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), #0066ff, var(--accent2));
  }
  .ai-insight-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    font-family: var(--font-mono); font-size: 11px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .ai-insight-body { font-size: 13px; line-height: 1.6; color: var(--text); }
  .ai-insight-body p { margin: 0 0 6px; }
  .ai-insight-body p:last-child { margin-bottom: 0; }
  .ai-insight-body strong { color: var(--accent); }
  .ai-insight-body ul, .ai-insight-body ol { margin: 4px 0 8px 16px; padding: 0; }
  .ai-insight-body li { margin-bottom: 4px; }
  .ai-insight-loading {
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 12px; font-family: var(--font-mono);
  }

  /* ── FLEET HEALTH BANNER ── */
  .fleet-health {
    display: flex; align-items: center; gap: 16px;
    padding: 6px 16px; border-radius: 8px;
    background: rgba(0,229,255,0.04); border: 1px solid var(--border);
  }
  .fleet-donut {
    position: relative; width: 40px; height: 40px;
  }
  .fleet-donut svg { transform: rotate(-90deg); }
  .fleet-donut-label {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-family: var(--font-mono); font-size: 9px; font-weight: 700; color: var(--text);
  }
  .fleet-stat { display: flex; align-items: center; gap: 4px; font-size: 11px; font-family: var(--font-mono); }
  .fleet-dot { width: 6px; height: 6px; border-radius: 50%; }
  .fleet-count { font-weight: 700; }

  /* ── SIMULATOR SLIDERS ── */
  .sim-slider-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; margin-bottom: 6px;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  }
  .sim-slider-label {
    font-family: var(--font-mono); font-size: 11px; color: var(--muted);
    width: 160px; flex-shrink: 0;
  }
  .sim-slider-label span { display: block; color: var(--text); font-size: 13px; margin-top: 2px; }
  .sim-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; background: var(--border); border-radius: 2px;
    outline: none; cursor: pointer;
  }
  .sim-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    box-shadow: 0 0 8px rgba(0,229,255,0.4);
    transition: transform 0.1s;
  }
  .sim-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }
  .sim-slider-val {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--accent); width: 50px; text-align: right;
  }
  .sim-golden-tag {
    font-size: 9px; color: var(--accent2); background: rgba(57,255,20,0.1);
    padding: 1px 6px; border-radius: 10px; border: 1px solid rgba(57,255,20,0.2);
  }

  /* ── ROI HERO CARD ── */
  .roi-hero {
    background: linear-gradient(135deg, rgba(57,255,20,0.06), rgba(0,229,255,0.06));
    border: 1px solid rgba(57,255,20,0.2); border-radius: 14px;

    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent2));

    font-family: var(--font-mono); font-size: 42px; font-weight: 700;
    color: var(--accent2); margin: 8px 0;
    text-shadow: 0 0 30px rgba(57,255,20,0.3);
  }

  /* ── PULSE ANIMATION ── */
  @keyframes critPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .crit-pulse { animation: critPulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const API = "http://localhost:8000";

// ── API HOOK ─────────────────────────────────────────────
function useApi(endpoint, deps = []) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  useEffect(() => {
    if (!endpoint) return;
    setLoading(true);
    fetch(`${API}${endpoint}`)
      .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, deps);
  return { data, loading, error };
}

// ── PLOTLY WRAPPER ───────────────────────────────────────
function Plot({ data, layout, style }) {
  const ref = useRef();
  useEffect(() => {
    if (!ref.current) return;
    const L = {
      paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
      font: { color: '#e8f0fe', family: 'DM Sans' },
      xaxis: { gridcolor: '#1e2d3d', zerolinecolor: '#1e2d3d' },
      yaxis: { gridcolor: '#1e2d3d', zerolinecolor: '#1e2d3d' },
      margin: { t: 32, r: 16, b: 48, l: 48 },
      legend: { bgcolor: 'transparent' },
      ...layout
    };
    Plotly.newPlot(ref.current, data, L, { responsive: true, displayModeBar: false });
  }, [data, layout]);
  return <div ref={ref} style={style || { width: '100%', height: 340 }} />;
}

// ── LOADING ──────────────────────────────────────────────
function Loading({ text = 'Loading...' }) {
  return <div className="loading"><div className="spinner" />{text}</div>;
}

// ── STATUS PILL ──────────────────────────────────────────
function StatusPill({ status }) {
  const icons = { HEALTHY: '●', WARNING: '◐', CRITICAL: '◉' };
  return <span className={`status ${status}`}>{icons[status]} {status}</span>;
}

// ── SIMPLE MARKDOWN RENDERER ─────────────────────────────
function renderMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^### (.+)$/gm, '<strong style="color:#00e5ff;font-size:14px">$1</strong>')
    .replace(/^## (.+)$/gm, '<strong style="color:#00e5ff;font-size:15px">$1</strong>')
    .replace(/^# (.+)$/gm, '<strong style="color:#00e5ff;font-size:16px">$1</strong>')
    .replace(/^- (.+)$/gm, '• $1')
    .replace(/^(\d+)\. (.+)$/gm, '$1. $2')
    .replace(/\n/g, '<br/>');
}

// ── AI INSIGHT BANNER ────────────────────────────────────
function AIInsight({ batchId, mode }) {
  const [insight, setInsight] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const prevRef = useRef('');

  useEffect(() => {
    const key = `${batchId}-${mode}`;
    if (!batchId || key === prevRef.current) return;
    prevRef.current = key;
    setLoading(true);
    setError(null);
    fetch(`${API}/insights/${batchId}?mode=${mode}`)
      .then(r => {
        if (!r.ok) throw new Error('Failed to generate insight');
        return r.json();
      })
      .then(d => { setInsight(d); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, [batchId, mode]);

  if (error) return null;

  return (
    <div className="ai-insight">
      <div className="ai-insight-header">
        <span>🤖</span> AI Analysis
        {insight && <span style={{ color: '#6b7a8d', fontWeight: 400, textTransform: 'none', letterSpacing: 0 }}> — {insight.batch_id}</span>}
      </div>
      {loading ? (
        <div className="ai-insight-loading">
          <div className="spinner" style={{ width: 16, height: 16, borderWidth: 1.5, margin: 0 }} />
          Analyzing batch {batchId}...
        </div>
      ) : insight ? (
        <div className="ai-insight-body" dangerouslySetInnerHTML={{ __html: renderMarkdown(insight.insight) }} />
      ) : null}
    </div>
  );
}

// ── CHAT PANEL ───────────────────────────────────────────
function ChatPanel({ isOpen, onClose }) {
  const [messages, setMessages] = useState([
    { role: 'assistant', content: "👋 Hi! I'm **AuraOptima AI**. Ask me anything about your batch data, golden signatures, energy savings, or quality optimization.\n\nTry one of the suggestions below, or type your own question!" }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const messagesEndRef = useRef(null);

  const scrollToBottom = () => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  };
  useEffect(scrollToBottom, [messages, loading]);

  const quickChips = [
    "Which batch has the best quality?",
    "How can I reduce carbon emissions?",
    "Summarize fleet performance",
    "Compare top vs bottom batches",
    "Explain the balanced golden signature",
  ];

  const sendMessage = async (text) => {
    if (!text.trim() || loading) return;
    const userMsg = { role: 'user', content: text.trim() };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput('');
    setLoading(true);

    try {
      // Build history (skip the initial greeting)
      const history = newMessages
        .slice(1)
        .filter((m, i) => i < newMessages.length - 2) // exclude the last user message
        .map(m => ({ role: m.role, content: m.content }));

      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text.trim(), history })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Chat request failed');
      }

      const data = await res.json();
      setMessages(prev => [...prev, { role: 'assistant', content: data.response }]);
    } catch (err) {
      setMessages(prev => [...prev, { role: 'assistant', content: `⚠️ Error: ${err.message}` }]);
    } finally {
      setLoading(false);
    }
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input);
    }
  };

  if (!isOpen) return null;

  return (
    <div className="chat-panel">
      <div className="chat-header">
        <div className="chat-header-title">
          <div className="chat-header-dot" />
          AuraOptima AI
        </div>
        <button className="chat-close" onClick={onClose}>✕</button>
      </div>

      <div className="chat-messages">
        {messages.map((msg, i) => (
          <div key={i} className={`chat-msg ${msg.role}`}
            dangerouslySetInnerHTML={{ __html: renderMarkdown(msg.content) }} />
        ))}
        {loading && (
          <div className="chat-typing">
            <div className="chat-typing-dot" />
            <div className="chat-typing-dot" />
            <div className="chat-typing-dot" />
          </div>
        )}
        <div ref={messagesEndRef} />
      </div>

      {messages.length <= 1 && (
        <div className="chat-chips">
          {quickChips.map((chip, i) => (
            <button key={i} className="chat-chip" onClick={() => sendMessage(chip)}>{chip}</button>
          ))}
        </div>
      )}

      <div className="chat-input-area">
        <textarea
          className="chat-input"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={handleKeyDown}
          placeholder="Ask about your batches..."
          rows={1}
        />
        <button className="chat-send" onClick={() => sendMessage(input)} disabled={loading || !input.trim()}>➤</button>
      </div>
    </div>
  );
}

    fetch(`${API}/golden-signatures`).then(r=>r.json()).then(setSigs);

  const act = (proposalId, action) => {
    fetch(`${API}/approve-update`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ proposal_id: proposalId, action, reviewer_note: note })

  const pendingList = Object.values(proposals);

  return (
    <div className="page">

      {msg && (
        <div style={{ padding: '10px 16px', background: 'rgba(57,255,20,0.08)', border: '1px solid rgba(57,255,20,0.3)', borderRadius: 8, color: '#39ff14', fontSize: 13, marginBottom: 16 }}>

      </div>

      <div className="grid-2">
        {/* Pending Proposals */}
        <div>
          <div className="card-title" style={{ marginBottom: 12, fontFamily: 'Space Mono', fontSize: 11, color: '#6b7a8d', textTransform: 'uppercase', letterSpacing: 1 }}>Pending Proposals</div>
          {pendingList.length === 0
            ? <div style={{ color: '#39ff14', fontFamily: 'Space Mono', fontSize: 13, padding: '20px 0' }}>✓ No pending proposals</div>
            : pendingList.map(p => (
              <div key={p.proposal_id} className="proposal-card PENDING">
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <span style={{ fontFamily: 'Space Mono', fontSize: 11, color: '#ffb300' }}>{p.proposal_id}</span>

              type: 'scatter', mode: 'markers',
              x: batches.map(b => b.Total_Energy_kWh),

              { batch: topBatch, label: '🏆 Best Batch', color: '#39ff14' },

// FLEET HEALTH DONUT (inline in topbar)
// ══════════════════════════════════════════════════════════
function FleetHealthBanner() {
  const { data } = useApi('/fleet-health', []);
  if (!data) return null;

  const total = data.total;
  const r = 16, c = 2 * Math.PI * r;
  const hPct = data.healthy / total;
  const wPct = data.warning / total;
  const cPct = data.critical / total;

  return (
    <div className="fleet-health">
      <div className="fleet-donut">
        <svg width="40" height="40" viewBox="0 0 40 40">
          <circle cx="20" cy="20" r={r} fill="none" stroke="#1e2d3d" strokeWidth="5" />
          <circle cx="20" cy="20" r={r} fill="none" stroke="#39ff14" strokeWidth="5"
            strokeDasharray={`${hPct * c} ${c}`} strokeDashoffset="0" />
          <circle cx="20" cy="20" r={r} fill="none" stroke="#ffb300" strokeWidth="5"
            strokeDasharray={`${wPct * c} ${c}`} strokeDashoffset={`${-hPct * c}`} />
          <circle cx="20" cy="20" r={r} fill="none" stroke="#ff3d57" strokeWidth="5"
            strokeDasharray={`${cPct * c} ${c}`} strokeDashoffset={`${-(hPct + wPct) * c}`} />
        </svg>
        <div className="fleet-donut-label">{data.health_pct}%</div>
      </div>
      <div style={{ display: 'flex', gap: 12 }}>
        <div className="fleet-stat">
          <div className="fleet-dot" style={{ background: '#39ff14' }} />
          <span className="fleet-count" style={{ color: '#39ff14' }}>{data.healthy}</span> OK
        </div>
        <div className="fleet-stat">
          <div className="fleet-dot" style={{ background: '#ffb300' }} />
          <span className="fleet-count" style={{ color: '#ffb300' }}>{data.warning}</span> Warn
        </div>
        <div className={`fleet-stat ${data.critical > 0 ? 'crit-pulse' : ''}`}>
          <div className="fleet-dot" style={{ background: '#ff3d57' }} />
          <span className="fleet-count" style={{ color: '#ff3d57' }}>{data.critical}</span> Crit
        </div>
      </div>
    </div>
  );
}

// TAB 6 — WHAT-IF SIMULATOR
// ══════════════════════════════════════════════════════════
function WhatIfSimulator({ activeMode }) {
  const [params, setParams] = useState(null);
  const [ranges, setRanges] = useState(null);
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [mode, setMode] = useState(activeMode);

  useEffect(() => setMode(activeMode), [activeMode]);

  // Initialize with golden params
  useEffect(() => {
    setLoading(true);
    fetch(`${API}/simulate`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ params: {}, mode })
    }).then(r => r.json()).then(d => {
      const golden = {};
      Object.entries(d.param_ranges).forEach(([k, v]) => { golden[k] = v.golden; });
      setParams(golden);
      setRanges(d.param_ranges);
      setResult(d);
      setLoading(false);
    });
  }, [mode]);

  const simulate = (newParams) => {
    setParams(newParams);
    fetch(`${API}/simulate`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ params: newParams, mode })
    }).then(r => r.json()).then(setResult);
  };

  const resetToGolden = () => {
    if (!ranges) return;
    const golden = {};
    Object.entries(ranges).forEach(([k, v]) => { golden[k] = v.golden; });
    simulate(golden);
  };

  const handleSlider = (param, val) => {
    const newParams = { ...params, [param]: parseFloat(val) };
    simulate(newParams);
  };

  const paramLabels = {
    Granulation_Time: 'Granulation Time (min)',
    Binder_Amount: 'Binder Amount (g)',
    Drying_Temp: 'Drying Temp (°C)',
    Drying_Time: 'Drying Time (min)',
    Compression_Force: 'Compression Force (kN)',
    Machine_Speed: 'Machine Speed (RPM)',
    Lubricant_Conc: 'Lubricant Conc (%)',
  };

  if (loading || !params || !ranges || !result) return <div className="page"><Loading text="Initializing simulator..." /></div>;

  const comp = result.comparison;
  const outcomes = ['Quality_Score', 'Yield_Score', 'Total_Energy_kWh', 'Carbon_kg_CO2', 'Performance_Score'];
  const outcomeLabels = { Quality_Score: 'Quality', Yield_Score: 'Yield', Total_Energy_kWh: 'Energy (kWh)', Carbon_kg_CO2: 'Carbon (kg)', Performance_Score: 'Performance' };

  return (
    <div className="page">
      <div className="page-title">🔮 What-If Simulator</div>
      <div className="page-sub">Drag parameters to predict outcomes · Powered by ML regression on 60 batches</div>

      <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
        <button className="btn btn-cyan" onClick={resetToGolden}>↺ Reset to Golden</button>
        {[['energy','⚡ Energy'],['quality','🏆 Quality'],['balanced','⚖️ Balanced']].map(([m, label]) => (
          <button key={m} className={`btn ${mode===m ? 'btn-cyan' : ''}`}
            style={{ borderColor: mode===m ? 'var(--accent)' : 'var(--border)', color: mode===m ? 'var(--accent)' : 'var(--muted)' }}
            onClick={() => setMode(m)}>{label}</button>
        ))}
      </div>

      {/* Predicted KPIs */}
      <div className="grid-4" style={{ marginBottom: 16 }}>
        {[
          { key: 'Quality_Score',     label: 'Predicted Quality',  color: '#00e5ff', icon: '🏆' },
          { key: 'Total_Energy_kWh',  label: 'Predicted Energy',   color: '#ffb300', icon: '⚡' },
          { key: 'Carbon_kg_CO2',     label: 'Predicted Carbon',   color: '#ff3d57', icon: '🌿' },
          { key: 'Performance_Score', label: 'Predicted Perf',     color: '#39ff14', icon: '📊' },
        ].map(k => (
          <div className="kpi" key={k.key}>
            <div className="kpi-label">{k.icon} {k.label}</div>
            <div className="kpi-value" style={{ color: k.color, fontSize: 22 }}>
              {comp[k.key]?.predicted?.toFixed(1)}
            </div>
            <div className={`kpi-delta ${comp[k.key]?.good ? 'pos' : 'neg'}`}>
              {comp[k.key]?.diff > 0 ? '+' : ''}{comp[k.key]?.diff?.toFixed(1)} vs golden
            </div>
          </div>
        ))}
      </div>

      <div className="grid-2">
        {/* Sliders */}
        <div>
          <div className="card-title" style={{ marginBottom: 8 }}>PARAMETER CONTROLS</div>
          {Object.entries(params).map(([param, val]) => (
            <div key={param} className="sim-slider-row">
              <div className="sim-slider-label">
                {paramLabels[param] || param}
                <span>{val.toFixed(1)}</span>
              </div>
              <input type="range" className="sim-slider"
                min={ranges[param].min} max={ranges[param].max}
                step={ranges[param].step}
                value={val}
                onChange={e => handleSlider(param, e.target.value)}
              />
              {Math.abs(val - ranges[param].golden) < 0.01 && <span className="sim-golden-tag">GOLDEN</span>}
            </div>
          ))}
        </div>

        {/* Radar Chart */}
        <div className="card">
          <div className="card-title">PREDICTED vs GOLDEN SIGNATURE</div>
          <Plot
            data={[
              {
                type: 'scatterpolar', fill: 'toself', name: 'Predicted',
                r: outcomes.map(k => comp[k]?.predicted || 0),
                theta: outcomes.map(k => outcomeLabels[k]),
                fillcolor: 'rgba(0,229,255,0.15)',
                line: { color: '#00e5ff', width: 2 },
              },
              {
                type: 'scatterpolar', fill: 'toself', name: 'Golden',
                r: outcomes.map(k => comp[k]?.golden || 0),
                theta: outcomes.map(k => outcomeLabels[k]),
                fillcolor: 'rgba(57,255,20,0.08)',
                line: { color: '#39ff14', width: 2, dash: 'dash' },
              },
            ]}
            layout={{
              polar: {
                bgcolor: 'transparent',
                radialaxis: { visible: true, gridcolor: '#1e2d3d', color: '#6b7a8d', tickfont: { size: 9 } },
                angularaxis: { gridcolor: '#1e2d3d', color: '#e8f0fe', tickfont: { size: 10 } },
              },
              showlegend: true,
              legend: { orientation: 'h', y: -0.1, font: { color: '#e8f0fe' } },
              margin: { t: 24, b: 40 },
            }}
            style={{ width: '100%', height: 380 }}
          />
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// TAB 7 — ROI CALCULATOR
// ══════════════════════════════════════════════════════════
function ROICalculator() {
  const [costRate, setCostRate] = useState(8.0);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    setLoading(true);
    fetch(`${API}/roi?cost_per_kwh=${costRate}`)
      .then(r => r.json()).then(d => { setData(d); setLoading(false); });
  }, [costRate]);

  if (loading || !data) return <div className="page"><Loading text="Calculating ROI..." /></div>;

  const fmt = (n) => {
    if (n >= 100000) return `₹${(n/100000).toFixed(2)} Lakhs`;
    if (n >= 1000) return `₹${(n/1000).toFixed(1)}K`;
    return `₹${n.toFixed(0)}`;
  };

  const savings = data.batch_savings || [];

  return (
    <div className="page">
      <div className="page-title">💰 ROI Calculator</div>
      <div className="page-sub">Projected cost savings from optimizing batches to golden signature</div>

      {/* Cost Rate Input */}
      <div style={{ display: 'flex', gap: 12, marginBottom: 20, alignItems: 'center' }}>
        <span style={{ fontSize: 13, color: 'var(--muted)' }}>Energy Cost Rate:</span>
        <input type="number" value={costRate} onChange={e => setCostRate(parseFloat(e.target.value) || 8)}
          style={{ width: 100 }} step="0.5" min="1" max="50" />
        <span style={{ fontSize: 12, color: 'var(--muted)' }}>₹/kWh</span>
      </div>

      {/* Hero Card */}
      <div className="roi-hero">
        <div style={{ fontSize: 12, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 2, fontFamily: 'var(--font-mono)' }}>Annual Savings Potential</div>
        <div className="roi-hero-amount">{fmt(data.annual_cost_saved)}</div>
        <div className="roi-hero-sub">
          By optimizing <strong style={{ color: 'var(--accent)' }}>{data.improvable_batches}</strong> of {data.total_batches} batches to match the golden signature
        </div>
      </div>

      {/* KPI Grid */}
      <div className="grid-4" style={{ marginBottom: 20 }}>
        {[
          { label: 'Improvable Batches', value: `${data.improvable_batches} / ${data.total_batches}`, color: '#00e5ff' },
          { label: 'Energy Saved / Year', value: `${(data.annual_energy_saved_kwh/1000).toFixed(1)} MWh`, color: '#ffb300' },
          { label: 'CO₂ Reduced / Year', value: `${data.annual_carbon_saved_tonnes.toFixed(2)} t`, color: '#39ff14' },
          { label: 'Cost per Batch Save', value: `₹${data.improvable_batches > 0 ? (data.total_cost_saved / data.improvable_batches).toFixed(0) : 0}`, color: '#ff3d57' },
        ].map(k => (
          <div className="kpi" key={k.label}>
            <div className="kpi-label">{k.label}</div>
            <div className="kpi-value" style={{ color: k.color, fontSize: 20 }}>{k.value}</div>
          </div>
        ))}
      </div>

      <div className="grid-2">
        {/* Top Savings Bar Chart */}
        <div className="card">
          <div className="card-title">Top Batches by Savings Potential</div>
          <Plot
            data={[{
              type: 'bar',
              x: savings.slice(0,10).map(s => s.batch_id),
              y: savings.slice(0,10).map(s => s.cost_saved),
              marker: {
                color: savings.slice(0,10).map((s,i) => i < 3 ? '#39ff14' : i < 7 ? '#ffb300' : '#00e5ff'),
                opacity: 0.85
              },
              text: savings.slice(0,10).map(s => `₹${s.cost_saved.toFixed(0)}`),
              textposition: 'outside',
              textfont: { color: '#e8f0fe', size: 10 },
            }]}
            layout={{
              xaxis: { tickangle: -30, tickfont: { size: 10 } },
              yaxis: { title: 'Savings (₹)', gridcolor: '#1e2d3d' },
              margin: { t: 16, r: 16 },
            }}
            style={{ width: '100%', height: 300 }}
          />
        </div>

        {/* Energy vs Savings Scatter */}
        <div className="card">
          <div className="card-title">Current Energy vs Savings Potential</div>
          <Plot
            data={[{
              type: 'scatter', mode: 'markers',
              x: savings.map(s => s.current_energy),
              y: savings.map(s => s.energy_saved_kwh),
              text: savings.map(s => s.batch_id),
              marker: {
                size: savings.map(s => Math.max(6, s.cost_saved / 20)),
                color: savings.map(s => s.cost_saved),
                colorscale: [['0','#ffb300'],['1','#39ff14']],
                showscale: true,
                colorbar: { title: '₹', thickness: 12, tickfont: { size: 10 } }
              },
              hovertemplate: '<b>%{text}</b><br>Current: %{x:.1f} kWh<br>Savings: %{y:.1f} kWh<br>₹%{marker.color:.0f}<extra></extra>'
            }]}
            layout={{
              xaxis: { title: 'Current Energy (kWh)' },
              yaxis: { title: 'Savings Potential (kWh)' },
            }}
            style={{ width: '100%', height: 300 }}
          />
        </div>
      </div>

      {/* Summary */}
      <div style={{ marginTop: 16, padding: '14px 20px', background: 'rgba(57,255,20,0.05)', border: '1px solid rgba(57,255,20,0.2)', borderRadius: 10, fontSize: 13, lineHeight: 1.7 }}>
        <strong style={{ color: 'var(--accent2)' }}>💡 Business Impact Summary:</strong><br/>
        Implementing golden signature optimization across <strong>{data.improvable_batches} batches</strong> would save
        <strong style={{ color: 'var(--accent)' }}> {(data.annual_energy_saved_kwh/1000).toFixed(1)} MWh</strong> of energy and
        <strong style={{ color: 'var(--accent2)' }}> {data.annual_carbon_saved_tonnes.toFixed(2)} tonnes CO₂</strong> annually,
        translating to <strong style={{ color: 'var(--accent2)' }}>{fmt(data.annual_cost_saved)}</strong> in annual cost reduction
        at current rate of <strong>₹{costRate}/kWh</strong>.
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// ROOT APP
// ══════════════════════════════════════════════════════════
function App() {
  const [tab, setTab]         = useState('monitor');
  const [activeMode, setMode] = useState('balanced');
  const [chatOpen, setChatOpen] = useState(false);

  const { data: sigs } = useApi('/golden-signatures', [tab]);
  const { data: proposals } = useApi('/proposals', [tab]);
  const pendingCount = proposals ? Object.keys(proposals).length : 0;

  const navItems = [
    { id: 'monitor',       icon: '📊', label: 'Batch Monitor' },
    { id: 'simulator',     icon: '🔮', label: 'What-If Sim' },
    { id: 'optimization',  icon: '🧬', label: 'Optimization' },
    { id: 'hitl',          icon: '🧑‍🔬', label: 'HITL Manager' },
    { id: 'sustainability',icon: '🌿', label: 'Sustainability' },
    { id: 'roi',           icon: '💰', label: 'ROI Calculator' },
    { id: 'validation',    icon: '📋', label: 'Validation' },
  ];

  const modeLabels = {
    energy:   '⚡ Energy First',
    quality:  '🏆 Quality First',
    balanced: '⚖️ Balanced',
  };

  const tabComponents = {
    monitor:       <BatchMonitor activeMode={activeMode} />,
    simulator:     <WhatIfSimulator activeMode={activeMode} />,
    optimization:  <OptimizationEngine activeMode={activeMode} />,
    hitl:          <HITLManager />,
    sustainability:<Sustainability />,
    roi:           <ROICalculator />,
    validation:    <ValidationResults />,
  };

  return (
    <div className="shell">
      {/* SIDEBAR */}
      <div className="sidebar">
        <div className="logo-block">
          <div className="logo-icon">⚡</div>
          <div className="logo-name">AURAOPTIMA</div>
          <div className="logo-sub">Golden Signature Intelligence</div>
        </div>

        <nav className="nav">
          {navItems.map(item => (
            <div key={item.id} className={`nav-item ${tab === item.id ? 'active' : ''}`}
              onClick={() => setTab(item.id)}>
              <span className="nav-icon">{item.icon}</span>
              <span>{item.label}</span>
              {item.id === 'hitl' && pendingCount > 0 &&
                <span style={{ marginLeft: 'auto', background: '#ffb300', color: '#080c10', fontSize: 10, borderRadius: 10, padding: '1px 6px', fontWeight: 700 }}>{pendingCount}</span>
              }
            </div>
          ))}
        </nav>

        <div className="mode-block">
          <div className="mode-label">Active Mode</div>
          {Object.entries(modeLabels).map(([m, label]) => (
            <button key={m} className={`mode-btn ${activeMode === m ? 'active' : ''}`}
              onClick={() => setMode(m)}>{label}</button>
          ))}
          {sigs && sigs[activeMode] && (
            <div style={{ marginTop: 10, fontSize: 11, color: '#6b7a8d' }}>
              Signature: <span style={{ color: '#00e5ff', fontFamily: 'Space Mono' }}>{sigs[activeMode].source_batch}</span> v{sigs[activeMode].version || 1}
            </div>
          )}
        </div>
      </div>

      {/* MAIN */}
      <div className="main">
        <div className="topbar">
          <span className="topbar-title">
            {navItems.find(n => n.id === tab)?.icon} {navItems.find(n => n.id === tab)?.label}
          </span>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <FleetHealthBanner />
            <div className="topbar-badges">
              <span className="badge badge-cyan">60 Batches</span>
              <span className="badge badge-green">3 Signatures</span>
              {pendingCount > 0 && <span className="badge badge-warn">{pendingCount} Pending</span>}
              <span className="badge badge-cyan">{modeLabels[activeMode]}</span>
            </div>
          </div>
        </div>

        {tabComponents[tab]}
      </div>

      {/* Chat FAB + Panel */}
      <ChatPanel isOpen={chatOpen} onClose={() => setChatOpen(false)} />
      <button className={`chat-fab ${chatOpen ? 'open' : ''}`} onClick={() => setChatOpen(!chatOpen)}>
        {!chatOpen && <div className="chat-fab-pulse" />}
        {chatOpen ? '✕' : '🤖'}
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
